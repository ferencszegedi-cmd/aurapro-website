<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Circular arc - white outer -->
  <path d="M50 10 A50 50 0 0 1 100 60" stroke="#ffffff" stroke-width="16" stroke-linecap="round" fill="none"/>
  <!-- Circular arc - orange segment -->
  <path d="M50 10 A50 50 0 0 0 10 70" stroke="#f5a623" stroke-width="16" stroke-linecap="round" fill="none"/>
  <!-- Circular arc - white lower -->
  <path d="M10 70 A50 50 0 0 0 60 110" stroke="#ffffff" stroke-width="16" stroke-linecap="round" fill="none"/>
  <!-- Letter 'a' circle -->
  <circle cx="75" cy="68" r="22" stroke="#ffffff" stroke-width="8" fill="none"/>
  <!-- Letter 'a' tail -->
  <line x1="97" y1="48" x2="97" y2="90" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <!-- 'ura' text -->
  <text x="110" y="88" font-family="Montserrat, sans-serif" font-size="52" font-weight="400" fill="#ffffff">ura</text>
  <!-- 'pro' text -->
  <text x="228" y="88" font-family="Montserrat, sans-serif" font-size="52" font-weight="400" fill="#f5a623">pro</text>
  <!-- 'safety first' tagline -->
  <text x="195" y="112" font-family="Montserrat, sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.7)">safety first</text>
</svg>
